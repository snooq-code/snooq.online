<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GitHub Pages Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #555; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea { height: 120px; resize: vertical; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .loading {
            display: none;
        }
        @media (max-width: 600px) {
            .container { padding: 25px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Contact Us</h1>
        <p class="subtitle">We'll get back to you within 24 hours</p>
        
        <div id="alert" class="alert"></div>
        
        <form id="contactForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone">
            </div>
            
            <div class="form-group">
                <label for="subject">Subject *</label>
                <select id="subject" name="subject" required>
                    <option value="">Select a subject</option>
                    <option value="general">General Inquiry</option>
                    <option value="support">Technical Support</option>
                    <option value="sales">Sales Question</option>
                    <option value="callback">Request Callback</option>
                    <option value="feedback">Feedback</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">
                🚀 Send Message
            </button>
        </form>
    </div>

    <script>
        // Your Telegram Bot Token and Chat ID
        const BOT_TOKEN = '8803615282:AAFGKwOasWB-Pp1K0pmKsDoFFeSXUzgVHno';
        const CHAT_ID = '8819455405';
        
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const alertDiv = document.getElementById('alert');
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Sending...';
            alertDiv.className = 'alert';
            alertDiv.style.display = 'none';
            
            // Get form data
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value.trim();
            
            // Validate
            if (!name || !email || !subject || !message) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '❌ Please fill in all required fields.';
                alertDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Send Message';
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '❌ Please enter a valid email address.';
                alertDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Send Message';
                return;
            }
            
            try {
                // Build the message
                let notification = '🔔 <b>New Contact Form Submission</b>\n\n';
                notification += `<b>Name:</b> ${name}\n`;
                notification += `<b>Email:</b> ${email}\n`;
                if (phone) notification += `<b>Phone:</b> ${phone}\n`;
                notification += `<b>Subject:</b> ${subject}\n`;
                notification += `<b>Time:</b> ${new Date().toLocaleString()}\n\n`;
                notification += `<b>Message:</b>\n${message}`;
                
                // Send to Telegram using their API
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        chat_id: CHAT_ID,
                        text: notification,
                        parse_mode: 'HTML'
                    })
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    alertDiv.className = 'alert alert-success';
                    alertDiv.textContent = '✅ Your message has been sent successfully! We\'ll contact you soon.';
                    alertDiv.style.display = 'block';
                    document.getElementById('contactForm').reset();
                } else {
                    alertDiv.className = 'alert alert-error';
                    alertDiv.textContent = '❌ Failed to send message. Please try again.';
                    alertDiv.style.display = 'block';
                }
            } catch (error) {
                alertDiv.className = 'alert alert-error';
                alertDiv.textContent = '❌ An error occurred. Please try again.';
                alertDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Send Message';
            }
        });
    </script>
</body>
</html>
