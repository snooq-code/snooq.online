<!DOCTYPE html>
<html>
<head>
    <title>Telegram Test</title>
</head>
<body>
    <h2>Telegram Bot Test</h2>
    <button onclick="testTelegram()" style="padding:12px 24px;font-size:16px;cursor:pointer;">Send Test Message</button>
    <div id="result" style="margin-top:20px;font-family:monospace;"></div>

    <script>
    function testTelegram() {
        const botToken = '8797651346:AAGKGVsY37o7WTiopQx2dDk60IjoB9B9tQ0';
        const chatId = '8797651346';
        const message = '✅ Test message from GitHub Pages at ' + new Date().toLocaleString();

        document.getElementById('result').innerHTML = '⏳ Sending...';

        // Method 1: Direct
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatId,
                text: message,
                parse_mode: 'Markdown'
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.ok) {
                document.getElementById('result').innerHTML = '✅ Success! Check your Telegram!<br><br>' + JSON.stringify(data, null, 2);
            } else {
                document.getElementById('result').innerHTML = '❌ Error: ' + data.description + '<br><br>' + JSON.stringify(data, null, 2);
            }
            console.log(data);
        })
        .catch(error => {
            document.getElementById('result').innerHTML = '❌ Error: ' + error.message + '<br><br>Trying alternative method...';
            
            // Method 2: With proxy
            const proxyUrl = 'https://corsproxy.io/?';
            const apiUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;
            
            fetch(proxyUrl + encodeURIComponent(apiUrl), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message + ' (via proxy)',
                    parse_mode: 'Markdown'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    document.getElementById('result').innerHTML = '✅ Success via proxy! Check your Telegram!<br><br>' + JSON.stringify(data, null, 2);
                } else {
                    document.getElementById('result').innerHTML = '❌ Proxy error: ' + data.description;
                }
            })
            .catch(err => {
                document.getElementById('result').innerHTML = '❌ All methods failed. Error: ' + err.message;
            });
        });
    }
    </script>
</body>
</html>
