<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNOOQ — Order Now</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border: 2px solid #e7e0d6;
    }
    .logo {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: #b89b5e;
      margin-bottom: 20px;
      font-style: italic;
    }
    h2 { text-align: center; font-size: 1.5rem; color: #1c1c1c; margin-bottom: 20px; }
    .product-box {
      background: #f7f4ef;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      margin-bottom: 20px;
      border: 2px solid #e7e0d6;
    }
    .product-box img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; }
    .product-box h3 { margin-top: 8px; font-size: 1.1rem; color: #1c1c1c; }
    .product-box .price { font-size: 1.4rem; color: #9a7f4a; font-weight: bold; }
    .product-box .price small { font-size: 0.9rem; color: #6b6b6b; text-decoration: line-through; font-weight: normal; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; color: #1c1c1c; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px; border: 2px solid #e7e0d6; border-radius: 8px; font-size: 1rem;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #b89b5e; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      width: 100%; padding: 16px; background: #b89b5e; color: white; border: none; border-radius: 8px;
      font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 10px;
    }
    .btn:hover { background: #9a7f4a; transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .toast {
      position: fixed; bottom: 30px; right: 30px; background: #1c1c1c; color: white;
      padding: 16px 24px; border-radius: 12px; transform: translateX(120%); transition: transform 0.5s;
      max-width: 350px; z-index: 9999;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { background: #27ae60; }
    .toast.error { background: #e74c3c; }
    .toast.info { background: #3498db; }
    @media (max-width: 500px) { .container { padding: 20px; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">SNOOQ</div>
  <h2>🛒 Complete Your Order</h2>

  <div class="product-box">
    <img src="https://snooq.online/image/IMG_2431.PNG" alt="Combo" />
    <h3>20-in-1 Pro Combo Set</h3>
    <div class="price">₹999 <small>₹4500</small></div>
    <div style="color:#6b6b6b;font-size:0.85rem;">⭐ 4.9 · 9,847 sold</div>
  </div>

  <form id="orderForm">
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="fullName" placeholder="Enter your full name" required />
    </div>
    <div class="form-group">
      <label>Phone Number *</label>
      <input type="tel" id="phone" placeholder="Enter your phone number" required />
    </div>
    <div class="form-group">
      <label>WhatsApp Number *</label>
      <input type="tel" id="whatsapp" placeholder="Enter your WhatsApp number" required />
    </div>
    <div class="form-group">
      <label>Delivery Address *</label>
      <input type="text" id="address" placeholder="Street address, building, apartment" required />
    </div>
    <div class="row">
      <div class="form-group">
        <label>City *</label>
        <input type="text" id="city" placeholder="City" required />
      </div>
      <div class="form-group">
        <label>State *</label>
        <input type="text" id="state" placeholder="State" required />
      </div>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Pincode *</label>
        <input type="text" id="pincode" placeholder="Pincode" required />
      </div>
      <div class="form-group">
        <label>Country</label>
        <select id="country"><option value="India">India</option></select>
      </div>
    </div>
    <button type="submit" class="btn" id="submitBtn">Place Order · ₹999</button>
  </form>

  <p style="text-align:center;font-size:0.75rem;color:#6b6b6b;margin-top:12px;">
    🔒 Secure checkout · Cash on Delivery
  </p>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
  <div id="toastMessage">Order placed!</div>
</div>

<script>
  // ============================================================
  // SHOW TOAST NOTIFICATION
  // ============================================================
  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    const msg = document.getElementById('toastMessage');
    msg.textContent = message;
    toast.className = 'toast ' + type;
    toast.classList.add('show');
    clearTimeout(window.toastTimeout);
    window.toastTimeout = setTimeout(() => {
      toast.classList.remove('show');
    }, 4000);
  }

  // ============================================================
  // TELEGRAM BOT DETAILS
  // ============================================================
  const BOT_TOKEN = '8797651346:AAGKGVsY37o7WTiopQx2dDk60IjoB9B9tQ0';
  const CHAT_ID = '8797651346';

  // ============================================================
  // SEND TO TELEGRAM (No PHP needed!)
  // ============================================================
  function sendToTelegram(message) {
    // Using a CORS proxy to bypass CORS restrictions
    const proxyUrl = 'https://corsproxy.io/?';
    const apiUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    
    return fetch(proxyUrl + encodeURIComponent(apiUrl), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: message,
        parse_mode: 'Markdown'
      })
    })
    .then(response => {
      if (!response.ok) {
        // If proxy fails, try direct (works on some browsers)
        return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'Markdown'
          })
        });
      }
      return response;
    })
    .then(response => {
      // no-cors mode returns opaque response, we assume it works
      if (response.type === 'opaque') {
        return { ok: true };
      }
      return response.json();
    });
  }

  // ============================================================
  // PLACE ORDER
  // ============================================================
  document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();
    const address = document.getElementById('address').value.trim();
    const city = document.getElementById('city').value.trim();
    const state = document.getElementById('state').value.trim();
    const pincode = document.getElementById('pincode').value.trim();

    if (!name || !phone || !whatsapp || !address || !city || !state || !pincode) {
      showToast('Please fill all required fields!', 'error');
      return;
    }

    const orderId = 'SNOOQ-' + Date.now().toString().slice(-6);
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Sending...';

    const message = `
🛒 *NEW ORDER RECEIVED!* 🛒
━━━━━━━━━━━━━━━━━━━

📋 *Order ID:* ${orderId}
👤 *Customer:* ${name}
📱 *Phone:* ${phone}
📱 *WhatsApp:* ${whatsapp}
🏠 *Address:* ${address}, ${city}, ${state} - ${pincode}
📦 *Product:* 20-in-1 Combo Set (1x)
💰 *Amount:* ₹999.00
🎫 *Coupon:* None
📅 *Date:* ${new Date().toLocaleString()}
━━━━━━━━━━━━━━━━━━━
✅ *Payment:* Cash on Delivery
    `;

    sendToTelegram(message)
      .then(data => {
        btn.disabled = false;
        btn.textContent = 'Place Order · ₹999';
        showToast('🎉 Order #' + orderId + ' placed! Check Telegram.', 'success');
        document.getElementById('orderForm').reset();
      })
      .catch(error => {
        console.error('Error:', error);
        btn.disabled = false;
        btn.textContent = 'Place Order · ₹999';
        // Fallback: Open email
        const subject = encodeURIComponent('🛒 NEW ORDER: ' + orderId);
        const body = encodeURIComponent(message);
        if (confirm('Telegram not available. Open email to send order?')) {
          window.location.href = `mailto:YOUR_EMAIL@gmail.com?subject=${subject}&body=${body}`;
        }
        showToast('⚠️ Order placed! Check your Telegram or Email.', 'error');
      });
  });
</script>

</body>
</html>
